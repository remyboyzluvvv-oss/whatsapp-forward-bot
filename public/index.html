<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WhatsApp Bot Control</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --text: #1f2937;
      --card: #ffffff;
      --muted: #6b7280;
      --line: #e5e7eb;
      --btn: #2563eb;
      --btn-secondary: #6b7280;
    }
    body.dark {
      --bg: #111827;
      --text: #e5e7eb;
      --card: #1f2937;
      --muted: #94a3b8;
      --line: #334155;
      --btn: #3b82f6;
      --btn-secondary: #475569;
    }
    body { font-family: Arial, sans-serif; margin: 20px; background: var(--bg); color: var(--text); transition: background .2s ease, color .2s ease; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(320px,1fr)); gap: 16px; }
    .card { background: var(--card); border-radius: 10px; padding: 16px; box-shadow: 0 2px 10px rgba(0,0,0,.06); }
    h1 { margin-bottom: 16px; }
    h2 { margin-top: 0; font-size: 18px; }
    .status { font-weight: 700; }
    .status.connected { color: #0f9d58; }
    .status.disconnected { color: #d93025; }
    .status.restarting { color: #ca8a04; }
    label, input, select, button { font-size: 14px; }
    input, select { width: 100%; padding: 8px; margin-top: 6px; margin-bottom: 10px; box-sizing: border-box; border: 1px solid var(--line); background: var(--card); color: var(--text); }
    button {
      padding: 8px 12px;
      border: 0;
      border-radius: 8px;
      background: var(--btn);
      color: white;
      cursor: pointer;
      transition: transform 120ms ease, opacity 120ms ease, box-shadow 160ms ease, background 160ms ease;
      box-shadow: 0 1px 2px rgba(0, 0, 0, .08);
    }
    button:hover { box-shadow: 0 3px 10px rgba(37, 99, 235, .22); }
    button:active { transform: scale(0.97); opacity: 0.92; }
    button:disabled { cursor: not-allowed; opacity: 0.75; }
    button.is-loading { position: relative; padding-left: 30px; }
    button.is-loading::before {
      content: '';
      position: absolute;
      left: 10px;
      top: 50%;
      width: 12px;
      height: 12px;
      margin-top: -6px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, .6);
      border-top-color: #fff;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    button.secondary { background: var(--btn-secondary); }
    ul { list-style: none; padding: 0; margin: 0; }
    li { border-bottom: 1px solid var(--line); padding: 8px 0; }
    .muted { color: var(--muted); font-size: 12px; }
    .notice { margin-top: 8px; font-size: 12px; color: #1d4ed8; min-height: 16px; }
    .notice.error { color: #b91c1c; }
    #qr { max-width: 260px; width: 100%; border: 1px solid var(--line); border-radius: 8px; }
    .toolbar { display: flex; justify-content: flex-end; margin-bottom: 12px; }
    .theme-switch { display: inline-flex; align-items: center; gap: 8px; font-size: 14px; color: var(--muted); user-select: none; }
    .theme-switch input { display: none; }
    .slider {
      width: 44px;
      height: 24px;
      border-radius: 999px;
      background: #9ca3af;
      position: relative;
      transition: background .2s ease;
    }
    .slider::after {
      content: '';
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #fff;
      position: absolute;
      top: 3px;
      left: 3px;
      transition: transform .2s ease;
    }
    .theme-switch input:checked + .slider { background: #2563eb; }
    .theme-switch input:checked + .slider::after { transform: translateX(20px); }
  </style>
</head>
<body>
  <div class="toolbar">
    <label class="theme-switch">
      <span>Темная тема</span>
      <input id="themeToggle" type="checkbox" />
      <span class="slider"></span>
    </label>
  </div>
  <h1>Управление WhatsApp ботом</h1>
  <div class="grid">
    <section class="card">
      <h2>Статус сессии</h2>
      <div>Состояние: <span id="sessionStatus" class="status">...</span></div>
      <div>Номер: <span id="phoneNumber">-</span></div>
      <div>Последняя активность: <span id="lastActivity">-</span></div>
      <div style="margin-top: 12px;">
        <button id="restartBtn" class="secondary">Перезапустить сессию</button>
      </div>
    </section>

    <section class="card">
      <h2>QR-код (если отключено)</h2>
      <img id="qr" alt="QR code" />
      <div id="qrHint" class="muted">QR недоступен</div>
    </section>

    <section class="card">
      <h2>Добавить чат в мониторинг</h2>
      <label for="chatSelect">WhatsApp чат</label>
      <select id="chatSelect"></select>
      <label for="tgId">Telegram канал / чат ID</label>
      <input id="tgId" placeholder="-1001234567890" />
      <button id="addRouteBtn">Добавить маршрут</button>
      <div id="routeNotice" class="notice"></div>
    </section>

    <section class="card">
      <h2>Подключённые чаты</h2>
      <ul id="routesList"></ul>
    </section>

    <section class="card" style="grid-column: 1 / -1;">
      <h2>Последние 50 пересланных сообщений</h2>
      <ul id="messagesList"></ul>
    </section>
  </div>

  <script>
    let isAddingRoute = false;
    let isRouteSelectFocused = false;
    let userSelectedChatId = '';
    let uiConfigApplied = false;

    function esc(v) {
      return String(v ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    async function jget(url, opts) {
      const r = await fetch(url, opts);
      const text = await r.text();
      if (!r.ok) {
        let msg = text || `HTTP ${r.status}`;
        try {
          const errObj = JSON.parse(text);
          if (errObj.error) msg = errObj.error;
        } catch {
          /* plain text body */
        }
        throw new Error(msg);
      }
      return text ? JSON.parse(text) : {};
    }

    function fmtDate(v) {
      return v ? new Date(v).toLocaleString() : '-';
    }

    async function loadUiConfig() {
      if (uiConfigApplied) return;
      const data = await jget('/api/config');
      uiConfigApplied = true;
      const el = document.getElementById('tgId');
      if (data.defaultTelegramChatId && el && !el.value.trim()) {
        el.value = data.defaultTelegramChatId;
      }
    }

    async function loadStatus() {
      const s = await jget('/api/status');
      const statusEl = document.getElementById('sessionStatus');
      if (s.restartInProgress) {
        statusEl.textContent = 'restarting…';
        statusEl.className = 'status restarting';
      } else {
        statusEl.textContent = s.sessionStatus;
        statusEl.className = `status ${s.sessionStatus === 'connected' ? 'connected' : 'disconnected'}`;
      }
      document.getElementById('phoneNumber').textContent = s.phoneNumber || '-';
      document.getElementById('lastActivity').textContent = fmtDate(s.lastActivityAt);
    }

    async function loadQr() {
      const q = await jget('/api/qr');
      const img = document.getElementById('qr');
      const hint = document.getElementById('qrHint');
      if (q.qr) {
        img.src = q.qr;
        img.style.display = 'block';
        hint.textContent = 'Сканируйте QR через WhatsApp на телефоне';
      } else {
        img.removeAttribute('src');
        img.style.display = 'none';
        hint.textContent = 'QR недоступен';
      }
    }

    function renderRoutesList(monitored) {
      const list = document.getElementById('routesList');
      const routes = Array.isArray(monitored) ? monitored : [];
      list.innerHTML = routes.length
        ? routes.map(r => `
          <li>
            <div><strong>${esc(r.chatName || r.chatId)}</strong></div>
            <div class="muted">WA: ${esc(r.chatId)}</div>
            <div class="muted">→ Telegram: ${esc(r.telegramChatId)}</div>
            <button onclick="removeRoute('${encodeURIComponent(r.chatId)}')">Убрать</button>
          </li>
        `).join('')
        : '<li class="muted">Нет подключённых чатов</li>';
    }

    async function loadMonitoredRoutes() {
      const data = await jget('/api/routes');
      renderRoutesList(data.monitored);
    }

    async function loadChatDropdown(force = false) {
      if (!force && (isAddingRoute || isRouteSelectFocused)) return;

      const select = document.getElementById('chatSelect');
      const previousSelection = userSelectedChatId || select.value;
      const data = await jget('/api/chats');
      select.innerHTML = (data.allChats || []).map(c => {
        const typeLabel = c.isGroup ? 'Группа' : 'Личка';
        return `<option value="${esc(c.id)}" data-name="${esc(c.name)}">[${typeLabel}] ${esc(c.name)}</option>`;
      }).join('');
      if (previousSelection && data.allChats && data.allChats.some(c => c.id === previousSelection)) {
        select.value = previousSelection;
        userSelectedChatId = previousSelection;
      } else if (data.allChats && data.allChats.length > 0) {
        userSelectedChatId = data.allChats[0].id;
      }
    }

    async function loadChats() {
      await loadMonitoredRoutes();
      await loadChatDropdown();
    }

    async function loadMessages() {
      const data = await jget('/api/messages');
      const list = document.getElementById('messagesList');
      list.innerHTML = data.items.length
        ? data.items.map(m => `
          <li>
            <div><strong>${m.sourceChatName}</strong> → ${m.telegramChatId}</div>
            <div>${m.sender}: ${m.textPreview}</div>
            <div class="muted">${fmtDate(m.at)}</div>
          </li>
        `).join('')
        : '<li class="muted">Пока нет пересланных сообщений</li>';
    }

    async function removeRoute(chatId) {
      const result = await jget(`/api/routes/${chatId}`, { method: 'DELETE' });
      renderRoutesList(result.monitored);
      await loadChatDropdown();
    }
    window.removeRoute = removeRoute;

    document.getElementById('addRouteBtn').addEventListener('click', async () => {
      const notice = document.getElementById('routeNotice');
      notice.textContent = '';
      notice.className = 'notice';

      const select = document.getElementById('chatSelect');
      const opt = select.options[select.selectedIndex];
      const chatId = select.value;
      const fromDataset = (opt && opt.dataset && opt.dataset.name) ? String(opt.dataset.name).trim() : '';
      const fromLabel = opt ? opt.textContent.replace(/^\[[^\]]+\]\s*/, '').trim() : '';
      const chatName = fromDataset || fromLabel;
      const telegramChatId = document.getElementById('tgId').value.trim();
      if (!chatId) {
        notice.textContent = 'Выберите WhatsApp-чат в списке (если список пуст — подождите, пока статус connected и нажмите «Обновить» страницу).';
        notice.className = 'notice error';
        return;
      }
      if (!telegramChatId) {
        notice.textContent = 'Введите Telegram ID канала/чата (например -100…)';
        notice.className = 'notice error';
        return;
      }

      const addBtn = document.getElementById('addRouteBtn');
      isAddingRoute = true;
      addBtn.disabled = true;
      addBtn.classList.add('is-loading');
      try {
        const result = await jget('/api/routes', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ chatId, chatName, telegramChatId })
        });
        document.getElementById('tgId').value = '';
        if (result.monitored) {
          renderRoutesList(result.monitored);
        } else {
          await loadMonitoredRoutes();
        }
        await loadChatDropdown(true);
        notice.textContent = result.warning
          ? `${result.persisted ? 'Маршрут добавлен' : 'Маршрут добавлен (в памяти)'}. ${result.warning}`
          : result.persisted
            ? 'Маршрут добавлен'
            : 'Маршрут добавлен (в памяти текущей сессии)';
      } catch (error) {
        notice.textContent = `Ошибка: ${error.message}`;
        notice.className = 'notice error';
      } finally {
        isAddingRoute = false;
        addBtn.disabled = false;
        addBtn.classList.remove('is-loading');
      }
    });

    document.getElementById('restartBtn').addEventListener('click', async () => {
      const restartBtn = document.getElementById('restartBtn');
      restartBtn.disabled = true;
      restartBtn.classList.add('is-loading');
      try {
        await jget('/api/session/restart', { method: 'POST' });
        await loadStatus();
        await loadQr();
      } catch (error) {
        alert('Перезапуск: ' + error.message);
      } finally {
        restartBtn.disabled = false;
        restartBtn.classList.remove('is-loading');
      }
    });

    async function refresh() {
      await Promise.allSettled([
        loadStatus(),
        loadUiConfig(),
        loadQr(),
        loadMonitoredRoutes(),
        loadChatDropdown(),
        loadMessages()
      ]);
    }

    const chatSelectEl = document.getElementById('chatSelect');
    chatSelectEl.addEventListener('focus', () => {
      isRouteSelectFocused = true;
    });
    chatSelectEl.addEventListener('blur', () => {
      isRouteSelectFocused = false;
    });
    chatSelectEl.addEventListener('change', () => {
      userSelectedChatId = chatSelectEl.value;
    });

    const themeToggle = document.getElementById('themeToggle');
    const savedTheme = localStorage.getItem('theme') || 'light';
    if (savedTheme === 'dark') {
      document.body.classList.add('dark');
      themeToggle.checked = true;
    }
    themeToggle.addEventListener('change', () => {
      const dark = themeToggle.checked;
      document.body.classList.toggle('dark', dark);
      localStorage.setItem('theme', dark ? 'dark' : 'light');
    });

    refresh();
    setInterval(refresh, 5000);
  </script>
</body>
</html>
